<div class="hud-ui-renderer-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>HUD UI Renderer</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div>
                <input id="hud_ui_enabled" type="checkbox" />
                <label for="hud_ui_enabled">เปิดใช้งานระบบแปลง HUD UI</label>
            </div>
            <div style="margin-top: 10px; display: flex; align-items: center; gap: 10px;">
                <input id="hud_ui_color" type="color" value="#4da6ff" style="cursor: pointer;" />
                <label for="hud_ui_color">สีหลักของ HUD (Accent Color)</label>
            </div>
            <p><small>เลือกสีที่ต้องการ ระบบจะเปลี่ยนสีเรืองแสงของ UI ให้ทันที</small></p>
        </div>
    </div>
</div>
